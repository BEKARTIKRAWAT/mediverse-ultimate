<!DOCTYPE html>
<html>
<head>
    <title>Mediverse Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #e0f2fe, #e0e7ff); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 1rem; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-width: 28rem; width: 100%; padding: 2rem; }
        h1 { font-size: 1.875rem; font-weight: bold; text-align: center; margin-bottom: 0.5rem; }
        .sub { text-align: center; color: #6b7280; margin-bottom: 2rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.75rem; margin-bottom: 1rem; font-size: 1rem; }
        button { width: 100%; background: linear-gradient(to right, #3b82f6, #4f46e5); color: white; padding: 0.75rem; border: none; border-radius: 0.75rem; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .error { color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem; text-align: center; }
        .link { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; }
        a { color: #3b82f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <div class="sub">Join Mediverse</div>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required>
            <input type="password" id="confirm" placeholder="Confirm Password" required>
            <div id="errorMsg" class="error"></div>
            <button type="submit">Create Account</button>
        </form>
        <div class="link">Already have an account? <a href="/login.html">Sign in</a></div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (password !== confirm) {
                document.getElementById('errorMsg').innerText = 'Passwords do not match';
                return;
            }
            if (password.length < 6) {
                document.getElementById('errorMsg').innerText = 'Password must be at least 6 characters';
                return;
            }
            const users = JSON.parse(localStorage.getItem('mediverse_users') || '{}');
            if (users[email]) {
                document.getElementById('errorMsg').innerText = 'Email already exists';
                return;
            }
            const newUser = { id: Date.now().toString(), email, name, password };
            users[email] = newUser;
            localStorage.setItem('mediverse_users', JSON.stringify(users));
            const safeUser = { id: newUser.id, email, name };
            localStorage.setItem('mediverse_current_user', JSON.stringify(safeUser));
            window.location.href = '/dashboard.html';
        });
    </script>
</body>
</html>
